name: Build configurations

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-wsl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

    - name: Free up disk space
      run: |
        echo "🧹 Freeing up disk space..."
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h
        echo "✅ Disk space freed"

    - name: Setup Cachix
      env:
        CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      if: env.CACHIX_AUTH_TOKEN != ''
      uses: cachix/cachix-action@v17
      with:
        name: nix-community
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Create secrets.nix for CI
      run: |
        echo "📝 Creating secrets.nix for CI environment..."
        cp secrets.nix.example secrets.nix
        echo "✅ Secrets file created"

    - name: Build wsl system configuration
      run: |
        echo "🔨 Building wsl system configuration..."
        nix build .#nixosConfigurations.wsl.config.system.build.toplevel --show-trace
        echo "✅ wsl system configuration builds successfully"

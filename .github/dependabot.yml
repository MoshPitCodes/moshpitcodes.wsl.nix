version: 2

# Dependabot configuration for automated dependency updates
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

updates:
  # GitHub Actions dependency updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    open-pull-requests-limit: 5
    reviewers:
      - "MoshPitCodes"
    # Group all GitHub Actions updates into a single PR
    groups:
      github-actions:
        patterns:
          - "*"

# Note: Nix flake.lock updates
# ------------------------------
# Dependabot does not natively support Nix flake inputs/flake.lock updates.
# Those are handled by .github/workflows/update-flake.yml (weekly PR).
# Manual updates: `nix flake update` or `nix flake update <input>`.
